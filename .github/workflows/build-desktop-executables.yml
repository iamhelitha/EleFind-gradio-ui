name: Build Desktop Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name EleFind \
            --collect-all gradio \
            --collect-all gradio_client \
            --collect-all sahi \
            --collect-all ultralytics \
            app.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name EleFind `
            --collect-all gradio `
            --collect-all gradio_client `
            --collect-all sahi `
            --collect-all ultralytics `
            app.py

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          cp dist/EleFind release/EleFind
          cat > release/run-elefind.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "$0")" && pwd)"
          chmod +x "$DIR/EleFind"
          "$DIR/EleFind"
          EOF
          chmod +x release/run-elefind.sh
          tar -czf EleFind-linux-x64.tar.gz -C release .

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          cp dist/EleFind release/EleFind
          cat > release/run-elefind.command <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "$0")" && pwd)"
          chmod +x "$DIR/EleFind"
          "$DIR/EleFind"
          EOF
          chmod +x release/run-elefind.command
          ditto -c -k --sequesterRsrc --keepParent release EleFind-macos-x64.zip

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/EleFind.exe release/EleFind.exe
          @"
          @echo off
          setlocal
          set DIR=%~dp0
          "%DIR%EleFind.exe"
          "@ | Set-Content -Path release/run-elefind.bat
          Compress-Archive -Path release\* -DestinationPath EleFind-windows-x64.zip -Force

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: EleFind-linux-x64
          path: EleFind-linux-x64.tar.gz

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: EleFind-macos-x64
          path: EleFind-macos-x64.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: EleFind-windows-x64
          path: EleFind-windows-x64.zip
